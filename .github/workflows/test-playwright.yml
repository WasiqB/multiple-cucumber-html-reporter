name: Test Playwright Example

on:
  push:
    branches:
      - main
    paths:
      - examples/playwright/*
      - reporter/**

  pull_request:
    branches:
      - main
    paths:
      - examples/playwright/*
      - reporter/**

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Restore dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ steps.pnpm-cache.outputs.STORE_PATH }}
            node_modules
            docs/node_modules
            examples/cypress/node_modules
            examples/playwright/node_modules
            examples/wdio/node_modules
            reporter/node_modules
            reporter/dist
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
          fail-on-cache-miss: true

      - name: Install Root Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Install Playwright dependencies
        working-directory: examples/playwright
        run: pnpm exec playwright install

      - name: Run Playwright
        working-directory: examples/playwright
        run: pnpm test
        env:
          CI: true
        continue-on-error: true

      - name: Generate Report
        working-directory: examples/playwright
        run: pnpm report

      - name: Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: examples/playwright/reports
